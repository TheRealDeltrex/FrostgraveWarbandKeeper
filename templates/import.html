{% extends "base.html" %}
{% block title %}Import · Frostgrave{% endblock %}
{% block content %}
  <section class="hero">
    <h1>Import warband</h1>
    <p>Load a previously exported .warbands file, or paste the JSON below.</p>
  </section>

  <div class="card">
    <h2>From file</h2>
    <form method="post" action="{{ url_for('warband_import') }}" enctype="multipart/form-data">
      <div class="form-row">
        <label for="file">Warband file</label>
        <input id="file" name="file" type="file" accept=".warbands,.json,application/json" />
      </div>
      <div class="form-row">
        <label for="json_text">Or paste JSON</label>
        <textarea id="json_text" name="json_text" class="tall" placeholder='{"name": "...", "wizard": {...}}'></textarea>
      </div>
      <div class="actions">
        <button class="btn" type="submit">Import</button>
        <a class="btn secondary" href="{{ url_for('home') }}">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
